name: download URL

on:
  workflow_dispatch:
    inputs:
      app_name:
        description: "Nome do arquivo"
        required: false
      app_link:
        description: "Link do download"
        required: true
      extensao:
        description: "Extensão do arquivo"
        required: true
        type: choice
        options:
          - msixbundle
          - msix
          - appx
          - appxbundle
          - exe
          - msi
          - zip
          - rar
          - 7z
          
run-name: >
  Download: ${{ github.event.inputs.app_name && github.event.inputs.app_name || 'Download URL' }}

jobs:
  download:
    runs-on: windows-latest
    steps:
      - name: Baixar do link
        run: |
          mkdir files
          curl -L "${{ github.event.inputs.app_link }}" -o ./files/${{ github.event.inputs.app_name && github.event.inputs.app_name || 'app' }}.${{ github.event.inputs.extensao }}
          
      - name: Upload com Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ github.event.inputs.app_name && github.event.inputs.app_name || 'meu-app' }}
          path: ./files/
          retention-days: 2
